server:
  port: ${PORT:8080}

spring:
  application:
    name: neoenergia-lms-api
  profiles:
    default: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

lms:
  api-token: ${LMS_API_TOKEN:local-dev-token}
  seed:
    enabled: ${LMS_SEED_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:lms;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false

lms:
  seed:
    enabled: true
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/lms}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

lms:
  seed:
    enabled: ${LMS_SEED_ENABLED:false}
  cors:
    allowed-origins: ${CORS_ORIGINS:}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
