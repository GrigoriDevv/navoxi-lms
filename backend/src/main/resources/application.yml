server:
  port: ${PORT:8080}

spring:
  application:
    name: navoxi-lms-api
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: ${LMS_S3_MAX_FILE_BYTES:104857600}
      max-request-size: ${LMS_S3_MAX_REQUEST_BYTES:110100480}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

lms:
  api-token: ${LMS_API_TOKEN:local-dev-token}
  jwt:
    secret: ${LMS_JWT_SECRET:${LMS_API_TOKEN:local-dev-token}}
    ttl-seconds: ${LMS_JWT_TTL_SECONDS:604800}
  demo:
    block-seed-logins: ${LMS_BLOCK_DEMO_SEED_LOGINS:false}
  auth:
    jit-provisioning-enabled: ${LMS_JIT_PROVISIONING:false}
    default-unit-id: ${LMS_JIT_DEFAULT_UNIT:matriz}
    allowed-email-domains: ${LMS_ALLOWED_EMAIL_DOMAINS:}
    bootstrap-admin-emails: ${LMS_BOOTSTRAP_ADMIN_EMAILS:}
    login-rate-limit:
      enabled: ${LMS_LOGIN_RATE_LIMIT_ENABLED:true}
      max-attempts: ${LMS_LOGIN_RATE_LIMIT_MAX:10}
      window-seconds: ${LMS_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
  seed:
    enabled: ${LMS_SEED_ENABLED:false}
    password: ${LMS_SEED_PASSWORD:demo1234}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  s3:
    enabled: ${LMS_S3_ENABLED:false}
    endpoint: ${LMS_S3_ENDPOINT:}
    region: ${LMS_S3_REGION:us-east-1}
    bucket: ${LMS_S3_BUCKET:}
    access-key: ${LMS_S3_ACCESS_KEY:}
    secret-key: ${LMS_S3_SECRET_KEY:}
    public-base-url: ${LMS_S3_PUBLIC_BASE_URL:}
    max-file-bytes: ${LMS_S3_MAX_FILE_BYTES:104857600}
    presign-ttl-seconds: ${LMS_S3_PRESIGN_TTL_SECONDS:3600}

springdoc:
  api-docs:
    path: /api-docs
    enabled: false
  swagger-ui:
    path: /swagger-ui.html
    enabled: false

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:lms;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: false

lms:
  seed:
    enabled: true
  auth:
    login-rate-limit:
      # Local/dev: off por default (testes + DX). Ative com LMS_LOGIN_RATE_LIMIT_ENABLED=true.
      enabled: ${LMS_LOGIN_RATE_LIMIT_ENABLED:false}
      max-attempts: ${LMS_LOGIN_RATE_LIMIT_MAX:60}
      window-seconds: ${LMS_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/lms}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

lms:
  demo:
    block-seed-logins: ${LMS_BLOCK_DEMO_SEED_LOGINS:true}
  auth:
    jit-provisioning-enabled: ${LMS_JIT_PROVISIONING:true}
    login-rate-limit:
      enabled: ${LMS_LOGIN_RATE_LIMIT_ENABLED:true}
      max-attempts: ${LMS_LOGIN_RATE_LIMIT_MAX:10}
      window-seconds: ${LMS_LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
  seed:
    # Deploy: seed off. DeploySecurityValidator falha se true.
    enabled: false
  cors:
    # Obrigatório em prod — sem default vazio (fail-fast se CORS_ORIGINS ausente/vazio).
    allowed-origins: ${CORS_ORIGINS}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
